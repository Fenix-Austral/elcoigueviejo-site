baseurl: ""
lang: es
timezone: America/Santiago
encoding: utf-8

# Datos del sitio
phone: "+56 9 9538 5525"
whatsapp: "https://wa.me/56995385525"
address: "Sector rural Punta Quihua, Comuna de Calbuco, Región de Los Lagos - CHILE"
maps_embed: "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2975.0278578848206!2d-73.18251022312084!3d-41.78461327124342!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x96186715c3656a47%3A0x60e48957fa466fff!2sEl%20Coigue%20Viejo!5e0!3m2!1ses-419!2scl!4v1773322412386!5m2!1ses-419!2scl"
web3forms_key: "" # Definir vía secret/variable de build; este valor quedará expuesto en el HTML generado

# Build settings
markdown: kramdown
permalink: /:year/:month/:day/:title/

# Sass/SCSS settings
sass:
  sass_dir: _sass
  style: compressed

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Defaults para posts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: "Tu Nombre"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
